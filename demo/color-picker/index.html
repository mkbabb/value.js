<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <title>Color Picker</title>
        <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

        <!-- Prevent flash: apply dark mode class + initial bg before any rendering -->
        <script>
            (function() {
                var stored = localStorage.getItem('vueuse-color-scheme');
                var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                var dark = stored === 'dark' || (!stored && prefersDark);
                if (dark) document.documentElement.classList.add('dark');
                document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
                var bg = localStorage.getItem('color-picker-bg');
                if (bg) document.documentElement.style.background = bg;
            })();
        </script>

        <script type="module">
            import { createApp } from "vue";
            import App from "./App.vue";

            const app = createApp(App);
            app.mount("#app");
        </script>
    </head>

    <body class="relative" id="app" style="overflow-x:hidden"></body>
</html>
