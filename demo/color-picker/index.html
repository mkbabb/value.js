<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Interactive color picker with 15 color spaces, gradient editor, palette browser, and image color extraction. Powered by value.js." />
        <title>Color Picker</title>
        <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

        <!-- Google Fonts: preconnect + non-blocking load (avoids render-blocking @import) -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" media="print" onload="this.media='all'" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&display=swap" media="print" onload="this.media='all'" />
        <noscript>
            <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" />
            <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&display=swap" />
        </noscript>

        <!-- Critical: prevent FOUC before Tailwind CSS loads.
             Without this, .hidden elements are visible during the
             CSS/JS race, causing both mobile+desktop panes to render
             simultaneously, expanding the viewport past 1024px and
             flipping media queries to desktop mode permanently.

             Uses @layer so that once Tailwind loads, its utilities
             (lg:flex, lg:block) take priority and override this. -->
        <style>
            @layer fouc-guard {
                .hidden { display: none; }
                body { background: var(--saved-bg); }
            }
        </style>

        <!-- Prevent flash: apply dark mode class + initial bg before any rendering. -->
        <script>
            (function() {
                var s = document.documentElement.style;
                var stored = localStorage.getItem('vueuse-color-scheme');
                var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                var dark = stored === 'dark' || (!stored && prefersDark);
                if (dark) document.documentElement.classList.add('dark');
                s.colorScheme = dark ? 'dark' : 'light';
                var bg = localStorage.getItem('color-picker-bg');
                if (bg) {
                    s.background = bg;
                    s.setProperty('--saved-bg', bg);
                    // Also set on body once it exists, so Tailwind base styles don't flash
                    document.addEventListener('DOMContentLoaded', function() {
                        document.body.style.background = bg;
                    }, { once: true });
                }
            })();
        </script>

        <script type="module">
            import { createApp } from "vue";
            import App from "./App.vue";
            import { router } from "../@/router/index";

            const app = createApp(App);
            app.use(router);
            app.mount("#app");
        </script>
    </head>

    <body class="relative" id="app"></body>
</html>
