<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Interactive color picker with 15 color spaces, gradient editor, palette browser, and image color extraction. Powered by value.js." />
        <title>Color Picker</title>
        <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

        <!-- Fraunces — the atlas/display voice's SINGLE brand source (R.W3 Lane A:
             the glass-ui fonts corpus carries Jakarta + Fira as real faces via
             the style.css import; it has no Fraunces, so the display face loads
             here). Preconnect + non-blocking load (avoids render-blocking
             @import). The former Fira Code link died with the corpus import —
             one source per face. -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" media="print" onload="this.media='all'" />
        <noscript>
            <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" />
        </noscript>

        <!-- W2-2 (T.W2): the per-stop ground properties, registered PRE-PAINT
             so the B0 ground can transition. Each is a `<color>` — registered
             <color> custom properties interpolate in OKLab (CSS Color 4), the
             chroma-honest path the F-12 ground transition rides. The
             initial-values are the LIGHT first-visit constants (the boot
             script below overwrites them — persisted record or the ACTIVE
             scheme's constant — before first paint; these literals only ever
             paint if the script itself fails). boot/ground.ts is the record
             of truth for the constants + the persisted shape. -->
        <style>
            @property --saved-bg-0 { syntax: "<color>"; inherits: true; initial-value: #b37290; }
            @property --saved-bg-1 { syntax: "<color>"; inherits: true; initial-value: #df8ea7; }
            @property --saved-bg-2 { syntax: "<color>"; inherits: true; initial-value: #ffb0b4; }
            @property --saved-bg-3 { syntax: "<color>"; inherits: true; initial-value: #ffd0c8; }
            @property --saved-bg   { syntax: "<color>"; inherits: true; initial-value: #b37290; }
        </style>

        <!-- W2-3 theme-color B0 sub-clause: minted from the persisted ground's
             base stop by the boot script below, pre-paint; useAtmosphere's
             sink updates it beside the `--saved-bg` pick transition. -->
        <meta name="theme-color" content="#b37290" />

        <!-- Critical: prevent FOUC before Tailwind CSS loads.
             Without this, .hidden elements are visible during the
             CSS/JS race, causing both mobile+desktop panes to render
             simultaneously, expanding the viewport past 1024px and
             flipping media queries to desktop mode permanently.

             Uses @layer so that once Tailwind loads, its utilities
             (lg:flex, lg:block) take priority and override this.

             W2-2: the body ground is the FIXED gradient template over the
             registered per-stop properties (the same template as style.css's
             base rule — the producer paletteToCssGradient geometry). The
             ground is a complete material from the first paint (B0). -->
        <style>
            @layer fouc-guard {
                .hidden { display: none; }
                body {
                    background-color: var(--saved-bg);
                    background-image: linear-gradient(
                        135deg,
                        var(--saved-bg-0) 0%,
                        var(--saved-bg-1) 33%,
                        var(--saved-bg-2) 67%,
                        var(--saved-bg-3) 100%
                    );
                }
            }
        </style>

        <!-- The fouc-guard boot script: scheme FIRST, then the ground.
             Order is the law (W2-2): resolve the ACTIVE scheme, then paint
             the persisted gradient ONLY on a scheme+version match — else the
             ACTIVE scheme's member of the first-visit constant PAIR (dark-
             honest by construction, F-6: a dark first run never boots as a
             light-pink page). The persisted shape is `{stops, scheme,
             deriveVersion}` — STOPS, never a gradient string; the read is
             shape-validated and falls to the constants on ANY malformation.
             Mirrors boot/ground.ts (the record of truth) — keep in lockstep. -->
        <script>
            (function() {
                var s = document.documentElement.style;
                var stored = localStorage.getItem('vueuse-color-scheme');
                var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                var dark = stored === 'dark' || (!stored && prefersDark);
                if (dark) document.documentElement.classList.add('dark');
                s.colorScheme = dark ? 'dark' : 'light';

                // The first-visit constant PAIR (boot/ground.ts FIRST_VISIT_GROUND):
                // the DEFAULT seed's derived gradient, per scheme (dark = the
                // producer derive's dark band — honest for a dark first run).
                var FIRST_VISIT = {
                    light: ['#b37290', '#df8ea7', '#ffb0b4', '#ffd0c8'],
                    dark:  ['#673255', '#944a62', '#ba696b', '#d6917c']
                };
                var VERSION = 1; // boot/ground.ts GROUND_RECORD_VERSION
                var scheme = dark ? 'dark' : 'light';
                var stops = FIRST_VISIT[scheme];
                try {
                    var rec = JSON.parse(localStorage.getItem('color-picker-ground'));
                    if (rec && rec.deriveVersion === VERSION &&
                        rec.scheme === scheme &&
                        Array.isArray(rec.stops) && rec.stops.length === 4 &&
                        rec.stops.every(function (x) { return /^#[0-9a-fA-F]{6}$/.test(String(x)); })) {
                        stops = rec.stops;
                    }
                } catch (e) { /* malformed record → the constants */ }
                for (var i = 0; i < 4; i++) {
                    s.setProperty('--saved-bg-' + i, stops[i]);
                }
                s.setProperty('--saved-bg', stops[0]);
                // theme-color rides the ground's base stop from B0.
                var meta = document.querySelector('meta[name="theme-color"]');
                if (meta) meta.setAttribute('content', stops[0]);
            })();
        </script>

        <script type="module">
            import { createApp } from "vue";
            import App from "./App.vue";
            import { router } from "../@/router/index";

            const app = createApp(App);
            app.use(router);
            app.mount("#app");
        </script>
    </head>

    <!-- W6-8 (S.W6 · card-lighting forensics artifact 1): the body IS the
         atmosphere/field plane host — it paints the `--saved-bg` derived
         ground and contains the aurora canvas AND every teleported overlay.
         `data-paper-field` is glass-ui's field contract: under this ancestor,
         the producer's orphan-card warm field-floor fallback (cards.css
         presence-behind gate) switches OFF, so every glass card — portaled
         dialogs included — reads the REAL atmosphere through the glass instead
         of painting its own interior amber lamp. One attribute; no local glass
         recipe. -->
    <body class="relative" id="app" data-paper-field></body>
</html>
