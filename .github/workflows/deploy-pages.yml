# deploy-pages.yml — color.babb.dev's deploy-of-record (the constellation
# CF-Pages spine; N.W4.F / Ask 5 / DEC-5).
#
# color.babb.dev is a Cloudflare Pages project (`color` → color-enw.pages.dev),
# deployed via wrangler — NOT GitHub Pages. The `npm run gh-pages` script name is
# a historical artefact (it builds the demo SPA to dist/gh-pages); the SITE ships
# to Cloudflare Pages, which is where the DNS for color.babb.dev points. The
# matching api origin (api.color.babb.dev) ships separately via the babb.dev
# spine webhook (scripts/deploy.sh api) — this workflow is the DEMO half only.
#
# GREEN-CI-GATED (the constellation verified-deploy-of-record idiom): it triggers
# on the `CI` workflow *completing* and deploys ONLY when that same-SHA run is
# GREEN, on a master push. A red CI → the deploy job's `if` is false → the SPA
# does NOT ship. Every green-CI master push DEPLOYS — no path filter (a master
# push should always re-ship the live site). `workflow_dispatch` allows a manual
# re-ship.
#
# SECRET DISCIPLINE: CLOUDFLARE_API_TOKEN (Pages:Edit + Read) + CLOUDFLARE_ACCOUNT_ID
# are GH Actions repo secrets, consumed via ${{ secrets.* }}, never inlined/echoed.
#
# FIRST-RUN NOTE: the `color` CF Pages project ALREADY EXISTS (verified via
# `wrangler pages project list`: color → color-enw.pages.dev / color.babb.dev),
# so no first-run project creation is needed — wrangler deploys into it. (Were it
# absent, `wrangler pages deploy` creates the named project on first push.)
name: deploy-pages

on:
    workflow_run:
        # Must match the `name:` of .github/workflows/ci.yml exactly.
        workflows: ["CI"]
        types: [completed]
    workflow_dispatch: {}

concurrency:
    group: deploy-pages-${{ github.event.workflow_run.head_sha || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    deploy:
        name: build demo + ship → Cloudflare Pages
        # Deploy on a manual dispatch, OR whenever the `CI` workflow finishes
        # GREEN on a master PUSH. The triple gate (conclusion == success AND
        # head_branch == master AND event == push) is the idiomatic
        # verified-deploy shape: a red CI, a non-master branch, or a non-push
        # trigger (e.g. a PR run) never ships the live site.
        if: >-
            github.event_name == 'workflow_dispatch' ||
            (github.event.workflow_run.conclusion == 'success' &&
             github.event.workflow_run.head_branch == 'master' &&
             github.event.workflow_run.event == 'push')
        runs-on: ubuntu-latest
        timeout-minutes: 20
        # NESTED-WORKSPACE LAYOUT (R.W7 X3 first-wire finding): actions/checkout
        # refuses paths outside $GITHUB_WORKSPACE, so the repo nests at ./value.js
        # with the `file:` siblings beside it (./glass-ui, ./keyframes.js).
        defaults:
            run:
                working-directory: value.js
        steps:
            - uses: actions/checkout@v5
              with:
                  # Build the EXACT SHA that CI proved green (not the branch tip,
                  # which could have advanced). On manual dispatch this is unset →
                  # falls back to the dispatched ref.
                  ref: ${{ github.event.workflow_run.head_sha || github.sha }}
                  fetch-depth: 0
                  path: value.js
            # The demo consumes @mkbabb/glass-ui via `file:../glass-ui` (kept
            # deliberately — the §3.4 pin policy, Q4 RATIFIED). So the siblings
            # must be checked out and their dists built BEFORE `npm ci` / the
            # demo build — the SAME precondition the CI jobs satisfy. (The
            # library itself imports glass-ui NEVER — inv-K-1 — but the DEMO does.)
            - name: "Checkout glass-ui @ tranche/BG (the D8-1-cured live tree; un-pin at the 5.0.0 master landing)"
              uses: actions/checkout@v5
              with:
                  repository: mkbabb/glass-ui
                  ref: tranche/BG
                  path: glass-ui
            - name: "Checkout keyframes.js (file: workspace dep)"
              uses: actions/checkout@v5
              with:
                  repository: mkbabb/keyframes.js
                  path: keyframes.js
            - uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: "npm"
                  cache-dependency-path: value.js/package-lock.json
            - name: Build glass-ui dist (gh-pages needs its full CSS dist)
              working-directory: glass-ui
              run: |
                  npm ci
                  npm run build
            - name: Build keyframes.js dist (the demo bundle resolves it via glass-ui's peer)
              working-directory: keyframes.js
              run: |
                  npm ci
                  npm run build
            - name: npm ci
              run: npm ci
            # The demo self-aliases `@mkbabb/value.js` → dist/value.js
            # (vite.config.ts, mechanism-C), so the library dist must exist before
            # the gh-pages build resolves the graph.
            - name: Build value.js dist (the self-alias target)
              run: npm run build
            - name: Build demo SPA (gh-pages mode → dist/gh-pages)
              run: npm run gh-pages
            # Plain wrangler invocation (R.W7 X3): the wrangler-action's npx
            # under the nested workingDirectory refused to fetch wrangler
            # non-interactively ("no YES option"). `npx --yes` + native env
            # auth is the explicit, magic-free equivalent.
            - name: Deploy to Cloudflare Pages
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              # The demo build output dir is dist/gh-pages (vite.config.ts
              # gh-pages mode outDir). `--commit-dirty=true` lets a clean CI
              # checkout deploy without a dirty-tree warning.
              #
              # --branch=master, NOT main: the CF Pages project `color`'s
              # PRODUCTION branch is `master` (verified via `wrangler pages
              # deployment list` 2026-07-07: the only Production deployment was
              # a2119a8d/16129e0, a month stale). Every `--branch=main` deploy
              # (incl. the R-close-era runs) landed as a PREVIEW deployment —
              # wrangler exits 0 and prints "Deployment complete", the run goes
              # green, but color-enw.pages.dev/color.babb.dev never update: a
              # FALSE-SUCCESS deploy. The branch flag must equal the project's
              # production branch for wrangler to cut a Production deployment.
              run: >-
                  npx --yes wrangler@4 pages deploy dist/gh-pages
                  --project-name=color
                  --branch=master
                  --commit-dirty=true
