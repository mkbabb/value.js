name: Node.js CI

on:
    push:
        branches: ["master"]
    pull_request:
        branches: ["master"]

jobs:
    # ─── Build + test matrix (Node 22 + 24) ─────────────────────────────
    # Per E.W4 Lane B: matrix coverage over the package.json `engines`
    # floor (>=22) and current LTS (24). Lint, vue-tsc, build, vitest,
    # api/ backend tests, proof:resolution, bench gate, playwright (5
    # projects), and CHANGELOG-changed PR-gate all live here so a single
    # check-name reflects the full health of the branch under each Node.
    build-and-test:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        strategy:
            fail-fast: false
            matrix:
                node: [22, 24]
        steps:
            - uses: actions/checkout@v4
              with:
                  # CHANGELOG-changed gate needs origin/master available
                  # for the merge-base diff.
                  fetch-depth: 0

            - name: Use Node.js ${{ matrix.node }}
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ matrix.node }}
                  cache: "npm"

            - run: npm ci

            # ─── Hygiene gates ──────────────────────────────────────
            - name: Lint (eslint flat config, --max-warnings=0)
              run: npm run lint

            # vue-tsc strict-zero gate (post-F.W1 Lane C vendor sweep).
            # Baseline lowered 126 → 0 after the zero-consumer shadcn-vue
            # subdir deletion. See VENDOR-POLICY.md + docs/tranches/F/audit/
            # F.W1-lane-c-vendor-sweep.md + F.W3-lane-c-vuetsc-baseline.md.
            - name: Assert vue-tsc error count (strict zero gate post-F.W1 Lane C)
              run: |
                  COUNT=$(npx vue-tsc --noEmit 2>&1 | grep -c 'error TS' || true)
                  if [ "$COUNT" -gt 0 ]; then
                      echo "vue-tsc count rose: $COUNT (gate ≤ 0 post-F.W1 vendor sweep)"
                      exit 1
                  fi
                  echo "vue-tsc: $COUNT errors (≤ 0 gate PASS)"

            # ─── Library build verification ─────────────────────────
            - name: Build library (dist/value.{js,cjs,d.ts})
              run: npm run build

            - name: Log dist sizes
              run: ls -la dist/ | head -20

            # ─── dts layout invariant guard (F.W3 Lane D) ───────────
            # Post-W12-unblocker (e1549e0) emits flat dist/ dts. Any
            # regression to dist/src/*.d.ts layout fails CI. See
            # docs/tranches/F/audit/F.W3-lane-d-dts-invariant.md.
            - name: Proof — dts layout invariant (W12-unblocker regression guard)
              run: npm run proof:dts-layout

            # ─── Bundle-size gate (F.W3 Lane E) ─────────────────────
            # dist/value.js post-F.W1 raw is ~125 KB. Budget: ≤ 145 KB
            # raw (148480 bytes) with ~20 KB headroom. The stat -c%s
            # (Linux/Ubuntu CI) || stat -f%z (macOS local) fallback
            # handles both platforms.
            - name: Assert dist/value.js size budget (≤ 145 KB raw)
              run: |
                  SIZE=$(stat -c%s dist/value.js 2>/dev/null || stat -f%z dist/value.js)
                  if [ "$SIZE" -gt 148480 ]; then
                      echo "dist/value.js size budget exceeded: $SIZE bytes (gate ≤ 148480 = 145 KB raw)"
                      exit 1
                  fi
                  echo "dist/value.js size: $SIZE bytes (gate ≤ 148480 PASS)"

            # ─── Vitest (unit tests) ────────────────────────────────
            - name: Vitest unit tests
              run: npx vitest run

            # ─── Backend tests (api/) ───────────────────────────────
            # mongodb-memory-server runs ephemerally in the runner;
            # no external Mongo required.
            - name: Backend tests (api/)
              run: |
                  cd api
                  npm install
                  npm test

            # ─── Contract-v2 dev-resolution proof ───────────────────
            # Per D.W1: tracked-in-CI but informational from the
            # fleet-coordination perspective; GREEN at HEAD so we run
            # it as a PASS-required gate for visibility.
            - name: proof:resolution (contract-v2 dev-resolution)
              run: npm run proof:resolution

            # ─── Bench gate (Lane A) ────────────────────────────────
            # Runs the three benchmarks sequentially and tees the
            # combined output for downstream assertion parsing.
            # Each bench self-asserts its target and exits non-zero
            # on regression; the explicit `Assert bench gates` step
            # below provides a visible, named CI assertion (and would
            # catch parser-output drift even if a bench script's
            # exit-code path bit-rotted).
            - name: Run benchmarks (npm run bench)
              run: npm run bench | tee bench-output.txt

            - name: Assert bench gates (L8 >= 5x, HSL->RGB >= 2x, nameParser >= 5x)
              run: |
                  set -euo pipefail

                  # L8 microbench: bench/color-channel-access.mjs
                  # Output line: "  median speedup:    NN.NN×"
                  # It runs FIRST in the chain, so head -1 against
                  # `median speedup:` lines isolates it (the parser
                  # bench also emits this label as the third entry).
                  L8_MEDIAN=$(grep -E 'median speedup:[[:space:]]+[0-9.]+' bench-output.txt \
                      | head -1 \
                      | grep -oE '[0-9]+\.[0-9]+')

                  # color2 DIRECT_PATHS bench: bench/color2-direct-paths.mjs
                  # Output line: "  hsl→rgb   median:            NN.NN×    [GATING]"
                  # Distinct from L8/parser via the [GATING] marker
                  # (only the canonical hot-path proxy is gated).
                  DIRECT_MEDIAN=$(grep -E 'hsl.*median:.*\[GATING\]' bench-output.txt \
                      | head -1 \
                      | grep -oE '[0-9]+\.[0-9]+' \
                      | head -1)

                  # nameParser bench: bench/parser-namelookup.mjs
                  # Output line: "  median speedup:    NN.NN×"
                  # It runs THIRD; sed -n '2p' against the two
                  # `median speedup:` lines isolates the parser one.
                  PARSER_MEDIAN=$(grep -E 'median speedup:[[:space:]]+[0-9.]+' bench-output.txt \
                      | sed -n '2p' \
                      | grep -oE '[0-9]+\.[0-9]+')

                  echo "Extracted medians:"
                  echo "  L8 (color-channel-access):       ${L8_MEDIAN}x  (gate >= 5x)"
                  echo "  DIRECT_PATHS HSL->RGB:           ${DIRECT_MEDIAN}x  (gate >= 2x)"
                  echo "  nameParser (parser-namelookup):  ${PARSER_MEDIAN}x  (gate >= 5x)"

                  fail=0

                  if [ -z "${L8_MEDIAN}" ]; then
                      echo "::error::Could not extract L8 median from bench-output.txt"
                      fail=1
                  elif awk -v m="${L8_MEDIAN}" 'BEGIN{exit !(m < 5)}'; then
                      echo "::error::L8 microbench regressed: ${L8_MEDIAN}x (gate >= 5x)"
                      fail=1
                  fi

                  if [ -z "${DIRECT_MEDIAN}" ]; then
                      echo "::error::Could not extract DIRECT_PATHS HSL->RGB median from bench-output.txt"
                      fail=1
                  elif awk -v m="${DIRECT_MEDIAN}" 'BEGIN{exit !(m < 2)}'; then
                      echo "::error::color2 DIRECT_PATHS HSL->RGB regressed: ${DIRECT_MEDIAN}x (gate >= 2x)"
                      fail=1
                  fi

                  if [ -z "${PARSER_MEDIAN}" ]; then
                      echo "::error::Could not extract nameParser median from bench-output.txt"
                      fail=1
                  elif awk -v m="${PARSER_MEDIAN}" 'BEGIN{exit !(m < 5)}'; then
                      echo "::error::nameParser regressed: ${PARSER_MEDIAN}x (gate >= 5x)"
                      fail=1
                  fi

                  if [ "$fail" -ne 0 ]; then
                      exit 1
                  fi
                  echo "All bench gates PASS."

            # ─── Playwright (5 projects: smoke + admin + mobile +
            #     reactivity + safari) ───────────────────────────────
            # WebKit added (smoke-safari project per E.W3 Lane B).
            # The cache key is hashed against package-lock.json so a
            # Playwright version bump busts the cache automatically.
            - name: Cache Playwright browsers
              uses: actions/cache@v4
              id: playwright-cache
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

            - name: Install Playwright browsers (chromium + webkit)
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps chromium webkit

            - name: Install Playwright system deps (cache hit)
              if: steps.playwright-cache.outputs.cache-hit == 'true'
              run: npx playwright install-deps

            - name: Playwright tests (all 5 projects)
              run: npx playwright test

            - name: Upload Playwright report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report-node-${{ matrix.node }}
                  path: playwright-report/
                  retention-days: 7

            # ─── CHANGELOG-changed gate (PR-only) ───────────────────
            # F.W3 Lane B broadening: per F-AUDIT-6 §5+§7, the W8-W12
            # dep-only commits slipped through E.W4's `^src/` filter
            # because package.json / vite/ts config / api/ changes alone
            # didn't fire it. The pattern below catches src/, top-level
            # package.json, vite.config.ts, tsconfig.json, and api/
            # (src/ + package.json). Lockfile-only changes
            # (package-lock.json) remain excluded — pure
            # version-resolution updates don't need CHANGELOG entries.
            # See docs/tranches/F/audit/F.W3-lane-b-changelog-gate.md.
            - name: Assert CHANGELOG touched when src/, package.json, vite/ts config, or api/ is touched
              if: github.event_name == 'pull_request'
              run: |
                  git diff --name-only origin/main...HEAD > diff-files.txt
                  if grep -qE "^(src/|package\.json$|vite\.config\.ts$|tsconfig\.json$|api/(src/|package\.json$))" diff-files.txt; then
                      grep -q "^CHANGELOG\.md$" diff-files.txt || (echo "CHANGELOG.md must be updated when src/, package.json, vite.config.ts, tsconfig.json, or api/ source/manifest is touched" && exit 1)
                  fi

    # ─── Deploy (gh-pages) — unchanged from pre-E.W4 ────────────────────
    # Runs after the matrix passes (implicit via `needs: build-and-test`).
    deploy:
        needs: build-and-test
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: "Checkout glass-ui (local file: dependency)"
              uses: actions/checkout@v4
              with:
                  repository: mkbabb/glass-ui
                  path: ../glass-ui
            - name: Use Node.js 24
              uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: "npm"
            - run: npm ci
            - run: npm run gh-pages
            - run: cp CNAME dist/gh-pages/

            - name: Deploy
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./dist/gh-pages
