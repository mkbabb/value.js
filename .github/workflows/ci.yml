name: ci

on:
    push:
        branches:
            - "**"
    pull_request:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    producer:
        name: producer / Node ${{ matrix.node }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node:
                    - 22
                    - 24
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm
            - run: npm ci
            - run: npm run lint
            - run: npx vue-tsc -p tsconfig.lib.json --noEmit
            - run: npx vue-tsc -p tsconfig.demo.json --noEmit
            - run: npm run build
            - run: npm test
            - name: pack producer bytes
              id: pack
              shell: bash
              run: |
                  # npm's stdout differs across npm 10/11 (the prepare script's vite banner
                  # polluted `--json` on Node 22) — derive the tarball name deterministically
                  # from package.json instead of parsing pack output.
                  FILE="$(node -p "const p=require('./package.json'); p.name.replace(/^@/,'').replace('/','-')+'-'+p.version+'.tgz'")"
                  npm pack --ignore-scripts > /dev/null
                  test -f "$FILE"
                  echo "filename=$FILE" >> "$GITHUB_OUTPUT"
            - name: verify packed runtime and strict declarations
              run: node scripts/ci/verify-packed-surface.mjs "${{ steps.pack.outputs.filename }}"

    # api re-gate (V·W45 / bracket B3): the standalone api package typechecks and
    # runs its full vitest suite (integration tests boot an ephemeral
    # mongodb-memory-server replica set — no external service). A broken api test
    # now fails CI, closing the "prod runs untested api code" gap.
    api:
        name: api / Node 22
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: api
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: api/package-lock.json
            - run: npm ci
            - run: npx tsc --noEmit
            - run: npm test
