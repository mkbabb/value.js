name: ci

on:
    push:
        branches:
            - "**"
    pull_request:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    producer:
        name: producer / Node ${{ matrix.node }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node:
                    - 22
                    - 24
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm
            - run: npm ci
            - run: npm run lint
            - run: npx vue-tsc -p tsconfig.lib.json --noEmit
            - run: npm run build
            - run: npm test
            - name: pack producer bytes
              id: pack
              shell: bash
              run: |
                  npm pack --json --ignore-scripts > /tmp/value-pack.json
                  node --input-type=module <<'NODE'
                  import { appendFileSync, readFileSync } from "node:fs";
                  const [packed] = JSON.parse(readFileSync("/tmp/value-pack.json", "utf8"));
                  appendFileSync(process.env.GITHUB_OUTPUT, `filename=${packed.filename}\n`);
                  NODE
            - name: verify packed runtime and strict declarations
              run: node scripts/ci/verify-packed-surface.mjs "${{ steps.pack.outputs.filename }}"
