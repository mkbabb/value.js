name: ci

on:
    push:
        branches:
            - "**"
    pull_request:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    producer:
        name: producer / Node ${{ matrix.node }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node:
                    - 22
                    - 24
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm
            - run: npm ci
            - run: npm run lint
            - run: npx vue-tsc -p tsconfig.lib.json --noEmit
            - run: npx vue-tsc -p tsconfig.demo.json --noEmit
              # D48: soft until W44/B2 declares @mkbabb deps (island not reconstructible by npm ci); W44 flips to hard
              continue-on-error: true
            - run: npm run build
            - run: npx vitest run --exclude 'demo/test/glass/**'
            - run: npx vitest run demo/test/glass
              # D56: the island-dependent glass suite (aurora pair) cannot resolve in CI
              # until W44/B2 declares the @mkbabb deps — soft here, W44 folds it back into
              # one hard `npm test` step (same rationale as D48 above)
              continue-on-error: true
            - name: pack producer bytes
              id: pack
              shell: bash
              run: |
                  npm pack --json --ignore-scripts > /tmp/value-pack.json
                  node --input-type=module <<'NODE'
                  import { appendFileSync, readFileSync } from "node:fs";
                  const [packed] = JSON.parse(readFileSync("/tmp/value-pack.json", "utf8"));
                  appendFileSync(process.env.GITHUB_OUTPUT, `filename=${packed.filename}\n`);
                  NODE
            - name: verify packed runtime and strict declarations
              run: node scripts/ci/verify-packed-surface.mjs "${{ steps.pack.outputs.filename }}"

    # api re-gate (V·W45 / bracket B3): the standalone api package typechecks and
    # runs its full vitest suite (integration tests boot an ephemeral
    # mongodb-memory-server replica set — no external service). A broken api test
    # now fails CI, closing the "prod runs untested api code" gap.
    api:
        name: api / Node 22
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: api
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: api/package-lock.json
            - run: npm ci
            - run: npx tsc --noEmit
            - run: npm test
