# Unified CI — the single gate matrix for @mkbabb/value.js (K.W2 CI/CD lane).
#
# Collapses the prior ci.yml (thin release-parity job) + node.js.yml (the
# Node 22/24 matrix workhorse) into ONE workflow conforming to the constellation
# UNIFIED-CICD standard (docs/tranches/K/audit/.../UNIFIED-CICD.md):
#   - concurrency group (cancel superseded runs)
#   - permissions floor (contents: read)
#   - Node 22 required floor + 24 ceiling matrix
#   - the canonical ladder: lint → typecheck → build → test → playwright →
#     lighthouse+axe (soft-launch)
#   - npm ci ALWAYS (the #177 lockfile-discipline rule)
#
# Deploy is NOT a CI step (DEC-9): the demo ships to Cloudflare Pages
# (color.babb.dev) and the api to the babb.dev spine (api.color.babb.dev :8130)
# via git-push→webhook in scripts/deploy.sh — never rsync, never inlined here.
name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    workflow_dispatch:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    # ── Build + test matrix (Node 22 floor + 24 ceiling) ────────────────────
    build-and-test:
        runs-on: ubuntu-latest
        # 20 is honest again post-T.W0 W0-CI: the browser E2E (the 12-min
        # smoke-safari long pole + the chromium smoke) MOVED to the parallel
        # e2e-smoke / e2e-safari jobs, so this job is the lib-gates ladder only
        # (~11 min). The S-close `timeout-minutes: 30` WORKAROUND (raised because
        # safari-in-this-job overran the 20-min budget → GH marked the timed-out
        # job CANCELLED → deploy-pages skipped) is DISCHARGED at its root: safari
        # owns its own job budget now. The peel's per-step SOFT bounds survive
        # verbatim in the e2e jobs; the LHCI-hash deploy peel survives in gh-pages.
        timeout-minutes: 20
        strategy:
            fail-fast: false
            matrix:
                node: [22, 24]
        # NESTED-WORKSPACE LAYOUT (R.W7 X3 first-wire finding): actions/checkout
        # refuses paths outside $GITHUB_WORKSPACE ("Repository path ... is not
        # under ..."), so the old `path: ../glass-ui` sibling checkout is fatal
        # on current runners. The repo checks out NESTED at ./value.js with the
        # `file:` siblings beside it (./glass-ui, ./keyframes.js) — the
        # package.json `file:../glass-ui` / `file:../keyframes.js` deps then
        # resolve inside the workspace. All run steps default into value.js/.
        defaults:
            run:
                working-directory: value.js
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  path: value.js

            # REF PIN (R.W7 X3, BOOKED un-pin): the demo REQUIRES the D8-1
            # layer(components) emission cure, which lives on glass-ui's live
            # tranche/BG branch — their master is the 4.2.0-era tree WITHOUT it
            # (proven: a master-built dist white-screens the page-load gate).
            # CI must consume the SAME producer tree local dev consumes
            # (file:../glass-ui tracks tranche/BG). UN-PIN to default when the
            # 5.0.0 cut lands on their master (the glass-ui adopt-event book).
            - name: "Checkout glass-ui @ tranche/BG (file: workspace dep — the D8-1-cured live tree)"
              uses: actions/checkout@v4
              with:
                  repository: mkbabb/glass-ui
                  ref: tranche/BG
                  path: glass-ui

            - name: "Checkout keyframes.js (file: workspace dep — provisions glass-ui's keyframes peer; its dist is a live /math consumer, KF-4)"
              uses: actions/checkout@v4
              with:
                  repository: mkbabb/keyframes.js
                  path: keyframes.js

            # The sibling dists build under Node 24 — the producers' own build
            # env (glass-ui master's lockfile is npm-11-valid but npm-10-refused;
            # the matrix below tests VALUE.JS under 22/24, not the producers).
            - name: Use Node 24 (the producers' build env)
              uses: actions/setup-node@v5
              with:
                  node-version: 24

            # glass-ui's dist/ is a gitignored build artefact — a fresh checkout
            # ships ZERO dist (no .d.ts, no CSS, no .js). N.W1.C repointed the
            # demo to resolve glass-ui from its dist (mechanism-C), and the
            # ledger §4 step-3 makes a dts-complete dist the W1 precondition for
            # the typecheck/boot-smoke/abrogation gates. So we MUST build it from
            # source here (a clean full rebuild: js + dts + css). 74 of the 91
            # HEAD errors N restored from were this dist's absence.
            - name: Build glass-ui dist (the dts/css/js W1 precondition)
              working-directory: glass-ui
              run: |
                  npm ci
                  npm run build

            - name: Build keyframes.js dist (the demo runtime graph imports it via glass-ui's peer)
              working-directory: keyframes.js
              run: |
                  npm ci
                  npm run build

            - name: Use Node.js ${{ matrix.node }} (the value.js ladder)
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ matrix.node }}
                  cache: "npm"
                  cache-dependency-path: value.js/package-lock.json

            - run: npm ci

            # ── 1 · lint ────────────────────────────────────────────────────
            - name: Lint (eslint flat config, --max-warnings=0)
              run: npm run lint

            # ── 2 · typecheck (blocking — inv-N-1) ──────────────────────────
            # `npm run typecheck` = the plain direct two-leaf gate
            # `vue-tsc -p tsconfig.lib.json --noEmit && vue-tsc -p
            # tsconfig.demo.json --noEmit` (N.W1.C retired the
            # scripts/check-types.mjs foreign-error filter — under
            # dist-resolution glass-ui resolves from its `dist/*.d.ts`, which
            # `skipLibCheck` skips, so the demo program reports zero
            # glass-ui-internal diagnostics and the filter was dead weight).
            # MEANINGFUL ONLY against a dts-complete glass-ui dist — the
            # checkout above must be a clean full rebuild (74 of the 91 HEAD
            # errors N restored from were that dist's absence). This is the
            # ledger §4 step-3 sweep gate, made structurally blocking here.
            - name: Typecheck (value.js lib + demo — blocking, inv-N-1)
              run: npm run typecheck

            - name: Typecheck (api/ — its own Node16 tsconfig)
              run: cd api && npm ci && npx tsc --noEmit

            # ── 2b · abrogation sweep (blocking — inv-N-10) ─────────────────
            # The ledger §4 steps 1–2: (1) every `@mkbabb/glass-ui/<subpath>`
            # import specifier in demo/ must resolve to a live exports entry
            # (a sibling subpath rename — e.g. the `glass-carousel` boot-fatal —
            # is caught at the diff); (2) glass-ui's `.retired-classes.txt`
            # manifest is grepped against demo/ class usage (a retired CSS class
            # silently no-ops — the P9 failure mode — so the manifest is the
            # only signal). Cheap; runs every push, not just at pin-bump.
            - name: Abrogation sweep (exports map + retired classes — inv-N-10)
              run: npm run abrogation-sweep

            # ── 3 · build + size budget ─────────────────────────────────────
            - name: Build library (dist/value.{js,d.ts})
              run: npm run build

            - name: Log dist sizes
              run: ls -la dist/ | head -20

            # dist/value.js post-W7.A raw ~137 KB. Budget ≤ 145 KB (148480 bytes).
            # This guards the JS CORE against bloat; it is structurally blind to
            # re-bundled vendor (the prettier chunks lived in SEPARATE dist/*.js
            # files, not value.js — E3 F-1/F-4). The whole-tarball gate below is
            # the structural backstop.
            - name: Assert dist/value.js size budget (≤ 145 KB raw)
              run: |
                  SIZE=$(stat -c%s dist/value.js 2>/dev/null || stat -f%z dist/value.js)
                  if [ "$SIZE" -gt 148480 ]; then
                      echo "dist/value.js size budget exceeded: $SIZE bytes (gate ≤ 148480)"
                      exit 1
                  fi
                  echo "dist/value.js size: $SIZE bytes (≤ 148480 PASS)"

            # WHOLE-TARBALL gate (N.W7.B) — measures the PUBLISHED package's
            # `unpackedSize` via `npm pack --dry-run --json`, the structural
            # backstop the per-file `dist/value.js` gate cannot be (E3 F-4).
            # Pre-N.W7.B the tarball was 560.7 KB unpacked — 303.6 KB (54%) of it
            # BUNDLED PRETTIER emitted into `dist/postcss-*.js` + `dist/standalone-*.js`
            # by the `formatCSS` dynamic import, invisible to the value.js-only
            # gate. N.W7.B externalized prettier (vite.config `external` + optional
            # peerDependency), dropping the tarball to ~283 KB (136.8 KB JS core +
            # 134.1 KB necessary flat-layout `.d.ts` + README). The < 200 KB
            # aspiration (E3's pre-W7.A estimate) is below the legitimate floor —
            # the dts is the W12-unblocker published type surface, not evictable
            # junk.
            # RE-DERIVED at R.W7 (the 2.0.0 surface): measured unpackedSize
            # 396,155 B (386.9 KB), 77 files, ZERO vendor chunks (verified: no
            # postcss/standalone/prettier paths) — the growth over the K-era
            # 320 KB gate is the legitimate 2.0.0 perceptual slate (boundary/
            # okhsl/difference modules + their flat .d.ts + subpath chunks).
            # Gate 440 KB: ~13% headroom over the real payload; a prettier-class
            # re-bundle (+~300 KB) still trips it instantly.
            - name: Assert published tarball size budget (npm pack unpackedSize ≤ 440 KB)
              run: |
                  SIZE=$(npm pack --dry-run --json --legacy-peer-deps 2>/dev/null | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{process.stdout.write(String(JSON.parse(d)[0].unpackedSize))})")
                  GATE=450560
                  if [ "$SIZE" -gt "$GATE" ]; then
                      echo "published tarball unpackedSize exceeded: $SIZE bytes (gate ≤ $GATE = 440 KB) — a re-bundled vendor dependency (e.g. prettier) likely slipped into dist/"
                      exit 1
                  fi
                  echo "published tarball unpackedSize: $SIZE bytes (≤ $GATE PASS)"

            # ── 4 · test ────────────────────────────────────────────────────
            - name: Vitest (unit suite)
              run: npx vitest run

            # api/ backend tests — mongodb-memory-server provides an in-runner
            # replica set (rs0) so the H1 services.withTransaction txn tests run
            # LIVE, not skipped. npm ci (not install) for #177 lockfile discipline.
            - name: Backend tests (api/)
              run: cd api && npm test

            # ── publish-shape regression catch ──────────────────────────────
            - name: Inspect publish shape (npm pack --dry-run)
              run: npm pack --dry-run --legacy-peer-deps

            # ── bench gate (value.js-local, NOT a constellation rung) ───────
            - name: Run benchmarks
              run: npm run bench | tee bench-output.txt

            - name: Assert bench gates (L8 >= 5x, HSL->RGB >= 2x, nameParser >= 5x)
              run: |
                  set -euo pipefail
                  L8_MEDIAN=$(grep -E 'median speedup:[[:space:]]+[0-9.]+' bench-output.txt | head -1 | grep -oE '[0-9]+\.[0-9]+')
                  DIRECT_MEDIAN=$(grep -E 'hsl.*median:.*\[GATING\]' bench-output.txt | head -1 | grep -oE '[0-9]+\.[0-9]+' | head -1)
                  PARSER_MEDIAN=$(grep -E 'median speedup:[[:space:]]+[0-9.]+' bench-output.txt | sed -n '2p' | grep -oE '[0-9]+\.[0-9]+')
                  echo "L8=${L8_MEDIAN}x DIRECT=${DIRECT_MEDIAN}x PARSER=${PARSER_MEDIAN}x"
                  fail=0
                  awk -v m="${L8_MEDIAN:-0}"     'BEGIN{exit !(m < 5)}' && { echo "::error::L8 regressed: ${L8_MEDIAN}x"; fail=1; }
                  awk -v m="${DIRECT_MEDIAN:-0}" 'BEGIN{exit !(m < 2)}' && { echo "::error::HSL->RGB regressed: ${DIRECT_MEDIAN}x"; fail=1; }
                  awk -v m="${PARSER_MEDIAN:-0}" 'BEGIN{exit !(m < 5)}' && { echo "::error::nameParser regressed: ${PARSER_MEDIAN}x"; fail=1; }
                  [ "$fail" -eq 0 ] && echo "All bench gates PASS."
                  exit $fail

    # ── 5 · e2e (chromium smoke) — de-matrixed + sharded (T.W0 W0-CI) ───────
    # Browser E2E is Node-runner-version-independent: the demo runs in the
    # browser, not in the test-runner's Node, so running the whole ~17-min
    # Playwright block inside the build-and-test [22, 24] matrix ran it TWICE
    # for ZERO added signal — a "useless meta item" (RATIFICATION §2). It now
    # runs ONCE, in its own job, PARALLEL to build-and-test (no `needs:`) so the
    # suite overlaps the lib gates instead of serialising after them. Chromium
    # smoke here (page-load HARD + full smoke soft); WebKit smoke-safari is the
    # sibling e2e-safari job so the 12-min sustained probe is not the whole
    # suite's long pole. The library's Node-22/24 compatibility stays proven by
    # lint/typecheck/build/vitest/api-tests in the matrix.
    e2e-smoke:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        defaults:
            run:
                working-directory: value.js
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  path: value.js
            - name: "Checkout glass-ui @ tranche/BG (the D8-1-cured live tree; un-pin at the 5.0.0 master landing)"
              uses: actions/checkout@v4
              with:
                  repository: mkbabb/glass-ui
                  ref: tranche/BG
                  path: glass-ui
            - name: "Checkout keyframes.js (file: workspace dep)"
              uses: actions/checkout@v4
              with:
                  repository: mkbabb/keyframes.js
                  path: keyframes.js
            - name: Use Node 24 (the producers' build env)
              uses: actions/setup-node@v5
              with:
                  node-version: 24
            - name: Build glass-ui dist (the demo's runtime CSS/dts/js)
              working-directory: glass-ui
              run: |
                  npm ci
                  npm run build
            - name: Build keyframes.js dist (the demo runtime graph imports it via glass-ui's peer)
              working-directory: keyframes.js
              run: |
                  npm ci
                  npm run build
            - name: Use Node 22 (the value.js ladder)
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: "npm"
                  cache-dependency-path: value.js/package-lock.json
            - run: npm ci
            # The demo dev server (playwright webServer) self-aliases
            # @mkbabb/value.js → dist/value.js (vite.config mechanism-C), so the
            # library dist must exist before the server can resolve the graph.
            - name: Build value.js dist (the demo self-alias target)
              run: npm run build
            - name: Cache Playwright browsers (chromium)
              uses: actions/cache@v4
              id: playwright-cache
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-${{ runner.os }}-${{ hashFiles('value.js/package-lock.json') }}
            - name: Install Playwright (chromium)
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps chromium
            - name: Install Playwright system deps (chromium, cache hit)
              if: steps.playwright-cache.outputs.cache-hit == 'true'
              run: npx playwright install-deps chromium
            # HARD gate: the inv-K-5 evidence — the demo boots with ZERO console
            # errors against NO backend (VITE_API_URL -> same-origin dev server).
            # No continue-on-error → a page-load regression reddens CI (and blocks
            # the deploy gate) exactly as it did inside build-and-test.
            - name: Playwright — page-load (inv-K-5 console-clean, HARD gate)
              run: npx playwright test --project=smoke e2e/smoke/page-load.spec.ts
            # SOFT gate: the broader chromium smoke project. Per-step 8-min bound
            # (the S-close peel LAW, preserved through the split): a headless hang
            # self-fails SOFT instead of consuming the job budget into a HARD
            # job-timeout (which continue-on-error does NOT swallow — it cancels
            # the job).
            - name: Playwright — full smoke project (soft-launch)
              continue-on-error: true
              timeout-minutes: 8
              run: npx playwright test --project=smoke
            - name: Upload Playwright report (chromium smoke)
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report-smoke
                  path: value.js/playwright-report/
                  retention-days: 7

    # ── 5b · e2e (WebKit smoke-safari) — parallel shard (T.W0 W0-CI) ─────────
    # The iOS-Safari engine gate (the S oracle floor's REAL smoke-safari gate,
    # which SURVIVES the diet): the sustained-30s context-loss probe + the
    # aurora shader-compile divergence surface (safari-truth §P0). SOFT
    # (continue-on-error) by DESIGN — it surfaces the KNOWN-LIVE glass-ui aurora
    # WebGL2 shader P0 that value.js is prohibited from shimming (L1). Its own
    # job so the 12-min probe runs PARALLEL to the chromium smoke + the lib
    # gates. This IS the root cure for the S-close CANCELLED runs: a 12-min
    # safari step inside the 20-min build-and-test job overran the budget → GH
    # marked the timed-out job CANCELLED → deploy-pages (workflow_run needs CI
    # success) was skipped. Safari now owns its own job budget + the 12-min
    # per-step SOFT bound (the peel LAW, verbatim). FLIP to hard-fail at the
    # glass-ui adopt-event once the shader defect lands (mirrors tranche/BG).
    e2e-safari:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        defaults:
            run:
                working-directory: value.js
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  path: value.js
            - name: "Checkout glass-ui @ tranche/BG (the D8-1-cured live tree; un-pin at the 5.0.0 master landing)"
              uses: actions/checkout@v4
              with:
                  repository: mkbabb/glass-ui
                  ref: tranche/BG
                  path: glass-ui
            - name: "Checkout keyframes.js (file: workspace dep)"
              uses: actions/checkout@v4
              with:
                  repository: mkbabb/keyframes.js
                  path: keyframes.js
            - name: Use Node 24 (the producers' build env)
              uses: actions/setup-node@v5
              with:
                  node-version: 24
            - name: Build glass-ui dist (the demo's runtime CSS/dts/js)
              working-directory: glass-ui
              run: |
                  npm ci
                  npm run build
            - name: Build keyframes.js dist (the demo runtime graph imports it via glass-ui's peer)
              working-directory: keyframes.js
              run: |
                  npm ci
                  npm run build
            - name: Use Node 22 (the value.js ladder)
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: "npm"
                  cache-dependency-path: value.js/package-lock.json
            - run: npm ci
            - name: Build value.js dist (the demo self-alias target)
              run: npm run build
            - name: Cache Playwright browsers (webkit)
              uses: actions/cache@v4
              id: playwright-cache
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-webkit-${{ runner.os }}-${{ hashFiles('value.js/package-lock.json') }}
            - name: Install Playwright (webkit)
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps webkit
            - name: Install Playwright system deps + ensure webkit (cache hit)
              if: steps.playwright-cache.outputs.cache-hit == 'true'
              # `install webkit` is idempotent — a no-op when cached, backfills a
              # pre-webkit cache.
              run: |
                  npx playwright install-deps webkit
                  npx playwright install webkit
            # SOFT (continue-on-error) — surfaces the L1 aurora-shader P0 in the
            # uploaded report without wedging the ladder on a foreign-tree fix.
            # Per-step 12-min bound (the peel LAW): the sustained-30s probe
            # completes on a slow runner yet self-fails SOFT if WebKit wedges.
            - name: Playwright — smoke-safari (WebKit, soft — surfaces the L1 aurora-shader P0)
              continue-on-error: true
              timeout-minutes: 12
              run: npx playwright test --project=smoke-safari
            - name: Upload Playwright report (smoke-safari)
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report-safari
                  path: value.js/playwright-report/
                  retention-days: 7

    # ── 6 · gh-pages build → CSS emission probe (BLOCKING) + lighthouse (soft) ─
    # Builds the demo SPA once, then runs two gates on that ONE artifact:
    #   · css-emission-probe (BLOCKING, inv-N-7 / N.W2.B) — asserts the
    #     desktop-pane-visibility witness utilities (lg:flex/lg:block/lg:hidden +
    #     sm:max-w-lg, used ONLY on App.vue's pane wrappers) survive into the
    #     emitted CSS under their breakpoints. If the demo's explicit `@source`
    #     scan ever stops covering App.vue, those utilities silently no-op and
    #     the secondary panes blank ≥1024px (K.W2.6 / C9 §1.1 P0). This is the
    #     P9 phantom-utility failure mode killed for the build-output side: a
    #     scan regression fails CI here instead of shipping a blank desktop.
    #   · lighthouse + axe (soft-launch — the W8 headline gap, M5.2): REQUIRED-
    #     but-soft (continue-on-error) prints the budgets for a baseline-capture
    #     wave, then flips to hard-fail.
    gh-pages:
        runs-on: ubuntu-latest
        needs: build-and-test
        timeout-minutes: 15
        defaults:
            run:
                working-directory: value.js
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  path: value.js
            - name: "Checkout glass-ui @ tranche/BG (the D8-1-cured live tree; un-pin at the 5.0.0 master landing)"
              uses: actions/checkout@v4
              with:
                  repository: mkbabb/glass-ui
                  ref: tranche/BG
                  path: glass-ui
            - name: "Checkout keyframes.js (file: workspace dep)"
              uses: actions/checkout@v4
              with:
                  repository: mkbabb/keyframes.js
                  path: keyframes.js
            - name: Use Node 24 (the producers' build env)
              uses: actions/setup-node@v5
              with:
                  node-version: 24
            - name: Build glass-ui dist (gh-pages needs its full CSS dist)
              working-directory: glass-ui
              run: |
                  npm ci
                  npm run build
            - name: Build keyframes.js dist (the demo bundle resolves it via glass-ui's peer)
              working-directory: keyframes.js
              run: |
                  npm ci
                  npm run build
            - name: Use Node 22 (the value.js ladder)
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: "npm"
                  cache-dependency-path: value.js/package-lock.json
            - run: npm ci
            - name: Build demo SPA (gh-pages mode → dist/gh-pages)
              run: npm run gh-pages
            # BLOCKING gate (inv-N-7 / N.W2.B): the desktop-pane witnesses must
            # survive into dist/gh-pages CSS. Runs on the just-built artifact.
            - name: CSS emission probe (desktop-pane witnesses — blocking, inv-N-7)
              run: npm run css-emission-probe
            # S.W0 W0-2(b): Lighthouse is now HARD (the M5.2 soft-launch flip).
            # `continue-on-error` removed → the lighthouserc.json `error`-level
            # assertions (the captured CWV baseline: CLS ≤ 0.1, LCP ≤ 2.5s,
            # INP ≤ 200ms, TBT ≤ 300ms, a11y ≥ 0.9) now BLOCK the ladder. A
            # first-paint perf/CLS regression on the just-built gh-pages artifact
            # reddens CI instead of shipping (e2e-coverage-gaps §4 P0 item 2).
            - name: Lighthouse CI (budget gate — HARD, W0-2b)
              uses: treosh/lighthouse-ci-action@v12
              env:
                  # LHCI's CWD is the WORKSPACE root (a `uses:` step), which is
                  # not a git repo — `git rev-parse HEAD` fails there and the
                  # upload phase errors ("LHCI 'upload' failed to upload to LHCI
                  # server", run 28833754238). Provide the hash explicitly.
                  LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}
              with:
                  # Nested layout: this is a `uses:` step, so the job's
                  # defaults.run.working-directory does NOT apply — LHCI's CWD is
                  # the WORKSPACE root. configPath is workspace-relative here, and
                  # lighthouserc.json's staticDistDir must ALSO be workspace-
                  # relative (value.js/dist/gh-pages): LHCI resolves it against
                  # CWD, not against the config file. First hard-gate execution
                  # ENOENT'd on exactly this (run 28832463506).
                  configPath: ./value.js/lighthouserc.json
                  uploadArtifacts: true
                  temporaryPublicStorage: true

    # ── 7 · boot-smoke (BLOCKING — inv-N-1 boot-truth) ──────────────────────
    # The white-screen-class defeat: boots the demo dev server on a COLD vite
    # dep-optimizer cache (`vite --force`) and asserts the app mounts (the
    # `role="main"` pane-shell landmark) with a console clean of value.js-origin
    # errors. A sibling glass-ui rename that types `any` under the dts-less
    # `file:` symlink + a warm dep-optimizer cache silently white-screens the
    # live demo while vitest/lint/typecheck all stay green — this gate runs the
    # real runtime path, cold, and fails loud. Standalone node script (NOT a
    # playwright spec; e2e/** is the 5-project suite's, owned separately).
    boot-smoke:
        runs-on: ubuntu-latest
        needs: build-and-test
        timeout-minutes: 15
        defaults:
            run:
                working-directory: value.js
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  path: value.js
            - name: "Checkout glass-ui @ tranche/BG (the D8-1-cured live tree; un-pin at the 5.0.0 master landing)"
              uses: actions/checkout@v4
              with:
                  repository: mkbabb/glass-ui
                  ref: tranche/BG
                  path: glass-ui
            - name: "Checkout keyframes.js (file: workspace dep)"
              uses: actions/checkout@v4
              with:
                  repository: mkbabb/keyframes.js
                  path: keyframes.js
            - name: Use Node 24 (the producers' build env)
              uses: actions/setup-node@v5
              with:
                  node-version: 24
            - name: Build glass-ui dist (the dts/css/js boot precondition)
              working-directory: glass-ui
              run: |
                  npm ci
                  npm run build
            - name: Build keyframes.js dist (the cold boot links the whole runtime graph)
              working-directory: keyframes.js
              run: |
                  npm ci
                  npm run build
            - name: Use Node 22 (the value.js ladder)
              uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: "npm"
                  cache-dependency-path: value.js/package-lock.json
            - run: npm ci
            # The demo self-aliases `@mkbabb/value.js` → dist/value.js
            # (vite.config.ts, mechanism-C), so the library dist must exist
            # before the dev server can resolve the graph.
            - name: Build value.js dist (the self-alias target)
              run: npm run build
            - name: Install Playwright (chromium)
              run: npx playwright install --with-deps chromium
            - name: Boot-smoke (cold dep-optimizer cache, headless mount + console-clean)
              run: npm run boot-smoke
