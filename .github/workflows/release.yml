# release — publish @mkbabb/value.js to npm on a v*.*.* tag (G.W5 Sub-wave C).
#
# Re-runs the release gate (build → typecheck → test → the dts-layout +
# resolution proofs) before npm publish so a tag never ships an artifact
# the CI gate would reject. value.js is the publish-chain root — keyframes.js
# + glass-ui resolve it via the npm registry, so its tag-publish fires first
# in the dependency order.
#
# Publish auth: NPM_TOKEN repository secret. Runs only on tag refs.
name: release

on:
    push:
        tags:
            - "v*.*.*"

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: "https://registry.npmjs.org"
            - run: npm ci
            - name: build
              run: npm run build
            - name: typecheck
              run: npm run typecheck
            - name: test
              run: npx vitest run
            - name: proof:dts-layout
              run: npm run proof:dts-layout
            - name: proof:resolution
              run: npm run proof:resolution
            - name: publish
              run: npm publish --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
