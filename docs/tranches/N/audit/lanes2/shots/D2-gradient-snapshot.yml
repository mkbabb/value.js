              - generic [ref=e585] [box=908,3159,451,21]: "xyz: XYZColor, toWhitePoint: WhitePoint = \"D50\""
              - text: "): LABColor { const labFunction = ("
              - generic [ref=e586] [box=985,3187,125,21]: "value: number"
              - text: ") => value > LAB_EPSILON ? Math.cbrt(value) : (LAB_KAPPA * value + LAB_OFFSET) / LAB_SCALE_L; const whitePoint = WHITE_POINTS[toWhitePoint]; const [x, y, z] = xyzToD50(xyz); // Normalize XYZ values relative to the given white point const xr = x / whitePoint[0], yr = y / whitePoint[1], zr = z / whitePoint[2]; const fx = labFunction(xr), fy = labFunction(yr), fz = labFunction(zr); // Calculate L*, a*, and b* values const l = LAB_SCALE_L * fy - LAB_OFFSET; // L* = 116 * f(Y/Yn) - 16 const a = LAB_SCALE_A * (fx - fy); // a* = 500 * [f(X/Xn) - f(Y/Yn)] const b = LAB_SCALE_B * (fy - fz); // b* = 200 * [f(Y/Yn) - f(Z/Zn)] const lab = new LABColor( scale( l, COLOR_SPACE_RANGES.lab.l.number.min, COLOR_SPACE_RANGES.lab.l.number.max, ), scale( a, COLOR_SPACE_RANGES.lab.a.number.min, COLOR_SPACE_RANGES.lab.a.number.max, ), scale( b, COLOR_SPACE_RANGES.lab.b.number.min, COLOR_SPACE_RANGES.lab.b.number.max, ), xyz.alpha, ); lab.whitePoint = toWhitePoint; return lab; }"
