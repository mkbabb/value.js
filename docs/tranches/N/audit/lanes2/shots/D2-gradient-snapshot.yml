            - code [ref=e692] [box=745,4649,720,2065]:
              - text: function lab2xyz(
              - generic [ref=e693] [box=908,4649,125,21]: "lab: LABColor"
              - text: "): XYZColor { const labFunctionXZ = ("
              - generic [ref=e694] [box=1004,4677,125,21]: "value: number"
              - text: ") => value > LAB_EPSILON_3 ? value ** 3 : (LAB_SCALE_L * value - LAB_OFFSET) / LAB_KAPPA; const labFunctionY = ("
              - generic [ref=e695] [box=995,4817,125,21]: "value: number"
              - text: ") => value > LAB_KAPPA_EPSILON ? ((value + LAB_OFFSET) / LAB_SCALE_L) ** 3 : value / LAB_KAPPA; const whitePoint = WHITE_POINTS[lab.whitePoint]; let { l, a, b, alpha } = lab; l = ch( scale( l, 0, 1, COLOR_SPACE_RANGES.lab.l.number.min, COLOR_SPACE_RANGES.lab.l.number.max, ), ); a = ch( scale( a, 0, 1, COLOR_SPACE_RANGES.lab.a.number.min, COLOR_SPACE_RANGES.lab.a.number.max, ), ); b = ch( scale( b, 0, 1, COLOR_SPACE_RANGES.lab.b.number.min, COLOR_SPACE_RANGES.lab.b.number.max, ), ); // Inverse of the xyz2lab function const fy = (l + LAB_OFFSET) / LAB_SCALE_L; // f(Y/Yn) = (L* + 16) / 116 const fx = a / LAB_SCALE_A + fy; // f(X/Xn) = a* / 500 + f(Y/Yn) const fz = fy - b / LAB_SCALE_B; // f(Z/Zn) = f(Y/Yn) - b* / 200 // Apply the inverse lab function to each value const [xr, yr, zr] = [ labFunctionXZ(fx), labFunctionY(l), labFunctionXZ(fz), ]; // Denormalize XYZ values relative to the given white point let x = xr * whitePoint[0], y = yr * whitePoint[1], z = zr * whitePoint[2]; const xyz = new XYZColor(x, y, z, alpha); xyz.whitePoint = lab.whitePoint; // All XYZ outputs are relative to D65: [x, y, z] = xyzToD65(xyz); xyz.whitePoint = \"D65\"; xyz.x = ch(x); xyz.y = ch(y); xyz.z = ch(z); return xyz; }"
