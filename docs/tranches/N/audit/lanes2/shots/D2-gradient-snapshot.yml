            - heading "Historical Context" [level=3] [ref=e257] [box=745,1551,454,28]
            - paragraph [ref=e258] [box=745,1579,454,196]:
              - text: Standardized by the CIE in 1976,
              - mark [ref=e259] [box=996,1583,28,20]: Lab
              - text: was designed to be
              - strong [ref=e260] [box=745,1611,151,20]: perceptually uniform
              - text: "—equal distances in the space should correspond to equal perceived color differences. It’s device-independent:"
              - mark [ref=e261] [box=847,1667,28,20]: Lab
              - text: describes
              - emphasis [ref=e262] [box=956,1667,35,20]: what
              - text: a color looks like, not how a particular device produces it. For decades it’s been the workhorse of color management, ICC profiles, and industrial colorimetry.
            - separator [ref=e263] [box=745,1775,454,1]
            - heading "Key Characteristics" [level=2] [ref=e264] [box=745,1776,454,28]
            - list [ref=e265] [box=745,1804,454,196]:
              - listitem [ref=e266] [box=745,1804,454,84]:
                - strong [ref=e267] [box=745,1808,158,20]: Perceptual uniformity
                - text: ": the founding goal. Largely successful, though the blue-purple region exhibits more error than Ottosson’s OKLab."
              - listitem [ref=e268] [box=745,1888,454,56]:
                - strong [ref=e269] [box=745,1892,162,20]: Device independence
                - text: ":"
                - mark [ref=e270] [box=916,1892,28,20]: Lab
                - text: values are defined relative to a standard illuminant, not a particular display or printer.
              - listitem [ref=e271] [box=745,1944,454,56]:
                - strong [ref=e272] [box=745,1948,148,20]: Separated lightness
                - text: ":"
                - math [ref=e275] [box=903,1954,23,11]:
                  - generic [ref=e277] [box=903,1954,23,11]:
                    - generic [ref=e278] [box=903,1954,9,11]: L
                    - generic [ref=e279] [box=915,1957,9,7]: ∗
                - text: is orthogonal to the chromatic axes, enabling brightness adjustment without hue shift.
            - heading "Advantages" [level=3] [ref=e280] [box=745,2000,454,28]
            - list [ref=e281] [box=745,2028,454,196]:
              - listitem [ref=e282] [box=745,2028,454,28]: Perceptually uniform (the CIE 1976 definition)
              - listitem [ref=e283] [box=745,2056,454,56]: Device-independent—the standard for cross-media color communication
              - listitem [ref=e284] [box=745,2112,454,56]: Covers all perceivable colors (gamut exceeds any physical display)
              - listitem [ref=e285] [box=745,2168,454,56]: Delta-E calculations (color difference metrics) are native to this space
            - heading "Disadvantages" [level=3] [ref=e286] [box=745,2224,454,28]
