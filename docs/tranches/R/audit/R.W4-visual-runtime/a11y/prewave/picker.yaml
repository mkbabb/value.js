  - heading "Historical Context" [level=3]
  - paragraph:
    - text: Standardized by the CIE in 1976,
    - mark: Lab
    - text: was designed to be
    - strong: perceptually uniform
    - text: "—equal distances in the space should correspond to equal perceived color differences. It’s device-independent:"
    - mark: Lab
    - text: describes
    - emphasis: what
    - text: a color looks like, not how a particular device produces it. For decades it’s been the workhorse of color management, ICC profiles, and industrial colorimetry.
  - separator
  - heading "Key Characteristics" [level=2]
  - list:
    - listitem:
      - strong: Perceptual uniformity
      - text: ": the founding goal. Largely successful, though the blue-purple region exhibits more error than Ottosson’s OKLab."
    - listitem:
      - strong: Device independence
      - text: ":"
      - mark: Lab
      - text: values are defined relative to a standard illuminant, not a particular display or printer.
    - listitem:
      - strong: Separated lightness
      - text: ":"
      - math: L ∗
      - text: is orthogonal to the chromatic axes, enabling brightness adjustment without hue shift.
  - heading "Advantages" [level=3]
  - list:
    - listitem: Perceptually uniform (the CIE 1976 definition)
    - listitem: Device-independent—the standard for cross-media color communication
    - listitem: Covers all perceivable colors (gamut exceeds any physical display)
    - listitem: Delta-E calculations (color difference metrics) are native to this space
  - heading "Disadvantages" [level=3]
  - list:
    - listitem:
      - text: Computationally heavier than RGB conversions (piecewise
      - math: f ( t )
      - text: function)
    - listitem:
      - text: Not directly displayable—out-of-gamut
      - mark: Lab
      - text: values must be mapped to sRGB or similar
    - listitem:
      - text: Unintuitive for manual color selection (what does
      - math: a ∗ = − 40
      - emphasis: look
      - text: like?)
  - heading "White Points" [level=3]
