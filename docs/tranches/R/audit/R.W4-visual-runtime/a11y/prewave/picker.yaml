  - heading "Color Conversions" [level=2]
  - heading "XYZ to Lab" [level=3]:
    - text: XYZ to
    - mark: Lab
  - paragraph: "Normalize XYZ by the reference white point, apply a piecewise function that approximates a cube root, then scale into L*a*b*:"
  - math: "f ( t ) = { t 3 t > ϵ κ t + 16 116 otherwise"
  - math: L ∗ = 116 f ⁣ ( Y Y n ) − 16 , a ∗ = 500 [ f ⁣ ( X X n ) − f ⁣ ( Y Y n ) ] , b ∗ = 200 [ f ⁣ ( Y Y n ) − f ⁣ ( Z Z n ) ]
  - paragraph:
    - text: where
    - math: ϵ = 216 24389
    - text: and
    - math: κ = 24389 27
    - text: .
  - code: "function xyz2lab(xyz: XYZColor, toWhitePoint: WhitePoint = \"D50\"): LABColor { const labFunction = (value: number) => value > LAB_EPSILON ? Math.cbrt(value) : (LAB_KAPPA * value + LAB_OFFSET) / LAB_SCALE_L; const whitePoint = WHITE_POINTS[toWhitePoint]; const [x, y, z] = xyzToD50(xyz); // Normalize XYZ values relative to the given white point const xr = x / whitePoint[0], yr = y / whitePoint[1], zr = z / whitePoint[2]; const fx = labFunction(xr), fy = labFunction(yr), fz = labFunction(zr); // Calculate L*, a*, and b* values const l = LAB_SCALE_L * fy - LAB_OFFSET; // L* = 116 * f(Y/Yn) - 16 const a = LAB_SCALE_A * (fx - fy); // a* = 500 * [f(X/Xn) - f(Y/Yn)] const b = LAB_SCALE_B * (fy - fz); // b* = 200 * [f(Y/Yn) - f(Z/Zn)] const lab = new LABColor( scale( l, COLOR_SPACE_RANGES.lab.l.number.min, COLOR_SPACE_RANGES.lab.l.number.max, ), scale( a, COLOR_SPACE_RANGES.lab.a.number.min, COLOR_SPACE_RANGES.lab.a.number.max, ), scale( b, COLOR_SPACE_RANGES.lab.b.number.min, COLOR_SPACE_RANGES.lab.b.number.max, ), xyz.alpha, ); lab.whitePoint = toWhitePoint; return lab; }"
  - heading "Lab to XYZ" [level=3]:
    - mark: Lab
    - text: to XYZ
  - paragraph: "Invert the L*a*b* formulas—recover the normalized XYZ ratios, apply the inverse piecewise function, then scale by the white point:"
  - math: f y = L ∗ + 16 116 , f x = a ∗ 500 + f y , f z = f y − b ∗ 200
  - math: X = X n ⋅ f − 1 ( f x ) , Y = Y n ⋅ f − 1 ( f y ) , Z = Z n ⋅ f − 1 ( f z )
  - code: "function lab2xyz(lab: LABColor): XYZColor { const labFunctionXZ = (value: number) => value > LAB_EPSILON_3 ? value ** 3 : (LAB_SCALE_L * value - LAB_OFFSET) / LAB_KAPPA; const labFunctionY = (value: number) => value > LAB_KAPPA_EPSILON ? ((value + LAB_OFFSET) / LAB_SCALE_L) ** 3 : value / LAB_KAPPA; const whitePoint = WHITE_POINTS[lab.whitePoint]; let { l, a, b, alpha } = lab; l = ch( scale( l, 0, 1, COLOR_SPACE_RANGES.lab.l.number.min, COLOR_SPACE_RANGES.lab.l.number.max, ), ); a = ch( scale( a, 0, 1, COLOR_SPACE_RANGES.lab.a.number.min, COLOR_SPACE_RANGES.lab.a.number.max, ), ); b = ch( scale( b, 0, 1, COLOR_SPACE_RANGES.lab.b.number.min, COLOR_SPACE_RANGES.lab.b.number.max, ), ); // Inverse of the xyz2lab function const fy = (l + LAB_OFFSET) / LAB_SCALE_L; // f(Y/Yn) = (L* + 16) / 116 const fx = a / LAB_SCALE_A + fy; // f(X/Xn) = a* / 500 + f(Y/Yn) const fz = fy - b / LAB_SCALE_B; // f(Z/Zn) = f(Y/Yn) - b* / 200 // Apply the inverse lab function to each value const [xr, yr, zr] = [ labFunctionXZ(fx), labFunctionY(l), labFunctionXZ(fz), ]; // Denormalize XYZ values relative to the given white point let x = xr * whitePoint[0], y = yr * whitePoint[1], z = zr * whitePoint[2]; const xyz = new XYZColor(x, y, z, alpha); xyz.whitePoint = lab.whitePoint; // All XYZ outputs are relative to D65: [x, y, z] = xyzToD65(xyz); xyz.whitePoint = \"D65\"; xyz.x = ch(x); xyz.y = ch(y); xyz.z = ch(z); return xyz; }"
