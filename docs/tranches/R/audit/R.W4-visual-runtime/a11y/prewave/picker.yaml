  - heading "Representation" [level=3]
  - paragraph:
    - text: A three-dimensional Cartesian space.
    - math: L ∗
    - text: is the vertical axis; the
    - math: a ∗
    - text: /
    - math: b ∗
    - text: plane describes chromaticity at each lightness level. The cylindrical variant (LCh) converts
    - math: a ∗
    - text: ","
    - math: b ∗
    - text: to polar coordinates—chroma and hue.
