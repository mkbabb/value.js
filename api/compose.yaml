services:
  api:
    build: .
    ports:
      - "127.0.0.1:8130:3000"
    environment:
      # directConnection=true: a single-node replica set advertises its member
      # host (`mongo:27017`) in the hello/isMaster reply; without this the driver
      # tries to reach that advertised host directly and can stall on first
      # connect. directConnection pins the driver to this one seed — the correct
      # idiom for a one-node rs0 (transactions still work: rs0 IS a replica set).
      MONGODB_URI: "mongodb://mongo:27017/palette-db?replicaSet=rs0&directConnection=true"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"
      PORT: "3000"
      # Deployed-code lineage stamp surfaced by GET /health (N.W4.D). The
      # deploy-hook exports DEPLOY_COMMIT_SHA before `up -d`; absent (local) it
      # falls through to "dev" in the app.
      DEPLOY_COMMIT_SHA: "${DEPLOY_COMMIT_SHA:-dev}"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    # Security hardening
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    # Healthcheck — probes /health (liveness + a live mongo ping), the
    # dedicated route, not the bare root (N.W4.D). A Mongo outage flips /health
    # to 503 so the container is marked unhealthy.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Log rotation
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  mongo:
    image: mongo:8
    # Single-node replica set `rs0` — the transactions P0 (N.W4.A). The 14
    # `withTransaction` sites require a replica-set deployment; a standalone
    # `mongod` rejects `session.startTransaction()`. One node IS a valid
    # replica set, so this is the minimal correct artifact (no extra members,
    # no arbiter). The healthcheck below performs the one-shot `rs.initiate`
    # idempotently, so the COMMITTED compose can execute every transaction.
    # No SCRAM auth / --keyFile and --bind_ip_all is the
    # "Mongo-discipline justified-residual (U-F37)": a WRITTEN, bounded
    # divergence from the precept (docs/precepts/infra/domains.md:149-155), NOT
    # a silent one. (This residual of record lived in the since-deleted
    # api/CLAUDE.md and now rides the diverging config itself; V·W45/D52.i.)
    # Bounded: mongo publishes no host port (internal compose bridge only) + the
    # api is loopback-bound (127.0.0.1:8130). mongod must still bind for the api
    # on the bridge, so --bind_ip_all stays; SCRAM+keyFile is the owner's
    # deploy-time election.
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      # rs.initiate is the standard single-node-rs init idiom run from the
      # healthcheck (no separate sidecar): try to read the rs status; if the
      # set is not yet initialised, initiate it. Idempotent — once a primary
      # exists, `rs.status().ok` is 1 and the catch arm never fires. The check
      # only reports healthy once a PRIMARY is elected, which is exactly the
      # condition the api's `depends_on: service_healthy` must wait for before
      # it opens a transaction-capable connection.
      test:
        - "CMD-SHELL"
        - >
          mongosh --quiet --eval '
            try { rs.status().ok }
            catch (e) {
              rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "mongo:27017" }] }).ok
            }
          ' | grep -q 1
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.5"
        reservations:
          memory: 256M
          cpus: "0.5"
    # Log rotation
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  internal:
    driver: bridge

volumes:
  mongo-data:
