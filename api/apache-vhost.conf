# api.color.babb.dev — the palette/colors API origin (the babb.dev spine).
#
# The spine's single Apache instance terminates TLS for *.babb.dev and reverse-
# proxies this subdomain to the Dockerized Hono api, which compose.yaml binds
# loopback-only at 127.0.0.1:8130 (`127.0.0.1:8130:3000`). This file is the
# <VirtualHost *:443> block for that subdomain; drop it into the spine's
# sites-enabled (or include it) alongside the other babb.dev origins.
#
# Required modules: mod_ssl, mod_proxy, mod_proxy_http, mod_headers
#   sudo a2enmod ssl proxy proxy_http headers
#   sudo systemctl reload apache2
#
# ── Port contract (N.W4.E) ──────────────────────────────────────────────────
#   compose.yaml exposes the api at 127.0.0.1:8130 (host) → :3000 (container).
#   This proxy targets 8130 — the SAME port compose binds. (The prior file was
#   stale at :3100 under the retired `mbabb.fi.ncsu.edu/colors/` path-prefix
#   topology; that NCSU origin is now a subdomain of its own, root-pathed.)
#
# ── DEC-9 / the NCSU-alias disposition (recorded honestly) ──────────────────
#   DEC-9 declared the NCSU alias `mbabb.fi.ncsu.edu/colors/` RETIRED. On the
#   wire it is NOT: the N.W4 verification (V3) found that alias ALIVE and
#   byte-identical to api.color.babb.dev (same upstream, same rate-limit pool).
#   Retiring it is an ON-HOST action — it lives in the NCSU box's Apache config,
#   not this repo. It CANNOT be retired from this file. The N.W8 deploy ceremony
#   carries the action item: remove the `mbabb.fi.ncsu.edu/colors/` proxy block
#   from the NCSU host's vhost (and let its DNS/cert lapse) once color.babb.dev
#   is confirmed serving HEAD-lineage code. Until then, both origins answer.

<VirtualHost *:443>
    ServerName api.color.babb.dev

    SSLEngine on
    # The spine manages the wildcard *.babb.dev certificate; these paths follow
    # the host's cert layout (certbot/Let's Encrypt). Adjust on-host if the
    # spine pins a different cert root.
    SSLCertificateFile      /etc/letsencrypt/live/babb.dev/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/babb.dev/privkey.pem

    # Root-pathed proxy: the api IS this subdomain's whole surface (no `/colors/`
    # prefix — that was the retired NCSU path topology). `/` → the loopback api.
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8130/
    ProxyPassReverse / http://127.0.0.1:8130/

    # Forwarded-context headers — the api reads X-Forwarded-* (trust-proxy-gated
    # IP resolution in middleware/ip.ts) to recover the real client over the
    # loopback hop.
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"
    RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"

    # Security headers (api origin — JSON only; no embedding, no framing).
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
    Header always set X-XSS-Protection "0"
    Header always set Content-Security-Policy "default-src 'none'; frame-ancestors 'none'"
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"

    ErrorLog  ${APACHE_LOG_DIR}/api.color.babb.dev-error.log
    CustomLog ${APACHE_LOG_DIR}/api.color.babb.dev-access.log combined
</VirtualHost>
